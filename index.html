<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>resolveHQ Server</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020202;
            overflow: hidden;
            color: white;
            position: relative;
        }

        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: rgba(255, 255, 255, 0.03);
            filter: blur(140px);
            border-radius: 50%;
        }

        .card {
            position: relative;
            z-index: 2;
            width: 430px;
            padding: 45px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
        }

        .logo {
            width: 90px;
            height: 90px;
            margin: 0 auto 24px;
            border-radius: 24px;
            background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 2px;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.03);
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        p {
            color: #8b8b8b;
            line-height: 1.7;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #d4d4d4;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.4);
                opacity: 0.6;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .footer {
            margin-top: 24px;
            color: #5f5f5f;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <div class="glow"></div>

    <div class="card">
        <div class="logo">R</div>

        <h1>RentNest</h1>

        <p>
            Backend server is active and operating normally.
        </p>

        <div class="status">
            <span class="dot"></span>
            SERVER ONLINE
        </div>

        <div class="footer">
            Node.js • Express • TypeScript
        </div>
    </div>
</body>

</html>
